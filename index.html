<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>47都道府県ルーレット</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        h1 { color: #333; margin-bottom: 20px; }

        .roulette-container {
            position: relative;
            width: 400px;
            height: 400px;
        }

        /* 針（ポインター） */
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ff4757;
            z-index: 10;
        }

        canvas {
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .controls {
            margin-top: 30px;
            text-align: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background-color: #2ed573;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.3s;
            box-shadow: 0 4px 0 #26af5f;
        }

        button:hover { background-color: #26af5f; }
        button:active { transform: translateY(2px); box-shadow: none; }
        button:disabled { background-color: #ccc; box-shadow: none; cursor: not-allowed; }

        #result {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            height: 2rem;
        }
    </style>
</head>
<body>

    <h1>🗾 47都道府県ルーレット</h1>

    <div class="roulette-container">
        <div class="pointer"></div>
        <canvas id="wheel" width="400" height="400"></canvas>
    </div>

    <div class="controls">
        <button id="spinBtn">ルーレットを回す！</button>
        <div id="result"></div>
    </div>

    <script>
        const prefectures = [
            "北海道", "青森県", "岩手県", "宮城県", "秋田県", "山形県", "福島県",
            "茨城県", "栃木県", "群馬県", "埼玉県", "千葉県", "東京都", "神奈川県",
            "新潟県", "富山県", "石川県", "福井県", "山梨県", "長野県", "岐阜県",
            "静岡県", "愛知県", "三重県", "滋賀県", "京都府", "大阪府", "兵庫県",
            "奈良県", "和歌山県", "鳥取県", "島根県", "岡山県", "広島県", "山口県",
            "徳島県", "香川県", "愛媛県", "高知県", "福岡県", "佐賀県", "長崎県",
            "熊本県", "大分県", "宮崎県", "鹿児島県", "沖縄県"
        ];

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resultDisplay = document.getElementById('result');

        const numSegments = prefectures.length;
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = canvas.width / 2;
        const segmentAngle = (2 * Math.PI) / numSegments;

        let currentRotation = 0;

        // ホイールを描画
        function drawWheel() {
            prefectures.forEach((name, i) => {
                const angle = i * segmentAngle;
                
                // セグメントの背景色
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + segmentAngle);
                ctx.fillStyle = i % 2 === 0 ? '#ffffff' : '#f1f2f6'; // 交互に色を変える
                ctx.fill();
                ctx.stroke();

                // テキストの描画
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + segmentAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#333";
                ctx.font = "10px sans-serif";
                ctx.fillText(name, radius - 10, 5);
                ctx.restore();
            });
        }

        drawWheel();

        spinBtn.addEventListener('click', () => {
            if (spinBtn.disabled) return;
            
            spinBtn.disabled = true;
            resultDisplay.textContent = "抽選中...";

            // 回転数をランダムに決定（最低5回転 + ランダム）
            const extraDegrees = Math.floor(Math.random() * 360);
            const totalRotation = 3600 + extraDegrees; // 10回転以上
            
            currentRotation += totalRotation;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            // アニメーション終了後に結果を表示（4秒後）
            setTimeout(() => {
                spinBtn.disabled = false;
                
                // 現在の角度から当選した都道府県を計算
                // 針は真上(-90度)にあるので、その位置を基準にする
                const actualDegrees = currentRotation % 360;
                const winningIndex = Math.floor((numSegments - (actualDegrees / 360) * numSegments + (numSegments * 0.75)) % numSegments);
                
                resultDisplay.textContent = `結果：${prefectures[winningIndex]}`;
            }, 4000);
        });
    </script>
</body>
</html>
